<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Fiscal Curator</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter&family=Manrope&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cascadia+Mono:ital,wght@0,200..700;1,200..700&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Petit+Formal+Script&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/all.min.css">
    <link rel="stylesheet" href="./css/bootstrap.min.css">
</head>

<body>

    <header class="topbar">
        <h1> <i class="fa-solid fa-building-columns"></i> Fiscal Curator</h1>
        <h2>Accounting 101</h2>
    </header>

    <div class="container-section">

        <!-- Sidebar -->
        <aside class="sidebar">
            <ul>
                <li class="active"><a href="#">Journal Entry</a></li>
                <li><a href="#">Trial Balance</a></li>
                <li><a href="#">Income Statement</a></li>
                <li><a href="#">Balance Sheet</a></li>
            </ul>
        </aside>

        <!-- Main -->
        <main class="main">

            <h2>Journal Entry</h2>

            <!-- Form -->
            <form id="entryForm" class="form">

                <input type="date" id="date">
                <input type="text" id="code" placeholder="Code">
                <input type="text" id="name" placeholder="Account Name">

                <select id="type">
                    <option>Asset</option>
                    <option>Liability</option>
                    <option>Equity</option>
                    <option>Revenue</option>
                    <option>Expense</option>
                </select>

                <input type="number" id="debit" placeholder="Debit">
                <input type="number" id="credit" placeholder="Credit">

                <button>Validate & Add</button>
            </form>
            <!-- Table Title -->
            <div class="title">
                <h4>Entry Preview</h4>
                <div class="content">
                    <span>Total Debit: <strong id="totalDebit">0$</strong></span>
                    <span>Total Credit: <strong id="totalCredit">0$</strong></span>
                </div>
            </div>

            <!-- Table -->
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Code</th>
                        <th>Name</th>
                        <th>Type</th>
                        <th>Debit</th>
                        <th>Credit</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
            <h3 id="status"></h3>
        </main>

    </div>

    <script src="./js/script.js"></script>
    <script src="./js/bootstrap.min.js"></script>
    <script src="./js/all.min.js"></script>
</body>

</html>
